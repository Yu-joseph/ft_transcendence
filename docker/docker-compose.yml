services:
  db:
    image: postgres:16
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sayf
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: mydb
    volumes:
      - ./db:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    ports:
      - "1234:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: hh@pgadmin.com
      PGADMIN_DEFAULT_PASSWORD: 1234
    depends_on:
      - db

  auth:
    container_name: auth
    build: ../backend/auth
    command: python3 manage.py runserver 0.0.0.0:8000
    restart: always
    networks:
      - app-network
    volumes:
      - ../backend/auth/myauth:/app
    depends_on:
      - db

  frontend:
    container_name: frontend
    restart: always
    networks:
      - app-network
    environment:
      - VITE_CLERK_PUBLISHABLE_KEY=pk_test_...
      - VITE_API_URL=http://localhost:5173
    build: ../frontend
    volumes:
      - ../frontend:/app/
  
  nginx:
    build : ./nginx
    container_name: nginx
    ports:
      - "8080:80"
    networks:
      - app-network
    depends_on:
      - frontend
      - auth

  game:
    build: ../backend/game_service
    container_name: game
    restart: unless-stopped
    networks:
      - app-network
    environment:
      DATABASE_URL: postgres://sayf:1234@db:5432/mydb
    # env_file:
    #   - .env
    depends_on:
      - db

  chat:
    build: ../backend/chat/chat-system/backend
    container_name: chat
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://sayf:1234@db:5432/mydb

volumes:
  pgdata: