services:
  db:
    image: postgres:16
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sayf
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: mydb
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    ports:
      - "1234:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: hh@pgadmin.com
      PGADMIN_DEFAULT_PASSWORD: 1234
    depends_on:
      - db

  auth:
    container_name: auth
    build: ../backend/auth
    command: python3 manage.py runserver 0.0.0.0:8000
    restart: always
    networks:
      - app-network
    volumes:
      - ../backend/auth/myauth:/app
    depends_on:
      - db

  frontend:
    container_name: frontend
    restart: always
    networks:
      - app-network
    environment:
      - VITE_CLERK_PUBLISHABLE_KEY=pk_test_...
      - VITE_API_URL=http://localhost:5173
    build: ../frontend
    volumes:
      - ../frontend:/app/
      - /app/node_modules 

  nginx:
    build : ./nginx
    container_name: nginx
    ports:
      - "8080:80"
    networks:
      - app-network
    depends_on:
      - frontend
      - auth
      - db
      - game-api
      - chat-api
      

  game:
    build: ../backend/game_service
    container_name: game
    restart: unless-stopped
    networks:
      - app-network
    environment:
      DATABASE_URL: postgres://sayf:1234@db:5432/mydb
    # env_file:
    #   - .env
    depends_on:
      - db
      - auth
      - frontend
  
  game-api:
    build: ../backend/ai_service/services/game_api
    container_name: game-api
    ports:
      - "5001:5001"
    networks:
      - app-network

  chat-api:
    build: ../backend/ai_service/services/chat_api
    container_name: chat-api
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy    
      game-api:
        condition: service_started
    env_file:
      - .env
    environment:
      GAME_API_URL: http://game-api:5001
    volumes:
      - ../backend/ai_service/static:/app/static
      - ../backend/ai_service/templates:/app/templates
      - ../backend/ai_service/uploads:/app/uploads
    networks:
      - app-network

  postgres:
    image: postgres:15
    container_name: game-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - pp_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s   
      timeout: 5s      
      retries: 10       

volumes:
  pgdata:
  pp_data:
  postgres_data:
    name: postgres_data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH}

networks:
  app-network:


