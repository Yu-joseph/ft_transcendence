services:
  db:
    image: postgres:16
    restart: always
    container_name : db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${ft_user}
      POSTGRES_PASSWORD: ${ft_password}
      POSTGRES_DB: ${ft_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ft_user} -d ${ft_db}"]
      interval: 5s   
      timeout: 5s      
      retries: 10 

  auth:
    container_name: auth
    build: ../backend/auth
    restart: always
    networks:
      - app-network
    volumes:
      - ../backend/auth/myauth:/app
      - vault-secrets:/vault/secrets
      - vault-chat:/vault/chat
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f curl -f http://localhost:8000/login || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    
  frontend:
    container_name: frontend
    restart: always
    networks:
      - app-network
    environment:
      - VITE_API_URL=http://localhost:8080/
      - VITE_CHAT_API=https://10.30.234.188:8443/api
    build: ../frontend

  nginx:
    build : ./nginx
    container_name: nginx
    ports:
      - "8080:80"
      - "8443:443"
    networks:
      - app-network
    restart: always
    depends_on:
      - frontend
      - auth
      - db
      - ai_game
      - chatbot
      - chat-system

  game:
    build: ../backend/game_service
    container_name: game
    restart: unless-stopped
    networks:
      - app-network
    environment:
      DATABASE_URL: postgres://sayf:1234@db:5432/mydb
      SECRET_KEY: ${DJANGO_SECRET_KEY}
    ports:
      - "1339:3000"
    depends_on:
      auth:
        condition: service_healthy
    volumes:
      - vault-ai:/vault/aii
  
  ai_game:
    build: ../backend/ai_service/ai_game
    container_name: ai_game
    ports:
      - "5001:5001"
    networks:
      - app-network

  chatbot:
    build: ../backend/ai_service/chatbot
    container_name: chatbot
    ports:
      - "5000:5000"
    depends_on:
      chat_db:
        condition: service_healthy    
      ai_game:
        condition: service_started
    env_file:
      - .env
    volumes:
      - vault-ai:/vault/aii
    networks:
      - app-network

  chat-system:
    build:
        context: ../backend/chat/backend
        dockerfile: Dockerfile
    container_name: chat-system
    restart: always
    depends_on:
      auth:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - vault-secrets:/vault/secrets
      - vault-chat:/vault/chat
    environment:
      SECRET_KEY: ${DJANGO_SECRET_KEY}
      DATABASE_URL: postgres://sayf:1234@db:5432/mydb
    networks:
      - app-network

  chat_db:
    image: postgres:15
    container_name: chat_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - pp_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s   
      timeout: 5s      
      retries: 10         

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - app-network
      
  cert-init:
    image: alpine/openssl
    container_name: cert-init
    volumes:
      - ./vault/userconfig/tls:/vault/userconfig/tls
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e

        if [ -f /vault/userconfig/tls/vault.crt ]; then
          echo "Certs already exist, skipping..."
          exit 0
        fi

        cd /vault/userconfig/tls

        openssl genrsa -out ca.key 4096
        openssl req -new -x509 -days 3650 -key ca.key -out ca.crt \
          -subj "/CN=vault-ca/O=MyOrg"

        openssl genrsa -out vault.key 2048
        openssl req -new -key vault.key -out vault.csr \
          -subj "/CN=vault/O=MyOrg"

        cat > san.cnf << 'EOF'
        [req]
        req_extensions = v3_req
        distinguished_name = req_distinguished_name
        [req_distinguished_name]
        [v3_req]
        basicConstraints = CA:FALSE
        keyUsage = digitalSignature, keyEncipherment
        extendedKeyUsage = serverAuth, clientAuth
        subjectAltName = @alt_names
        [alt_names]
        DNS.1 = vault
        DNS.2 = localhost
        DNS.3 = vault.test.lan
        IP.1  = 127.0.0.1
        EOF

        openssl x509 -req -days 365 \
          -in vault.csr -CA ca.crt -CAkey ca.key -CAcreateserial \
          -out vault.crt \
          -extfile san.cnf -extensions v3_req

        chmod 640 vault.key
        chown -R 100:100 /vault/userconfig/tls
    
  vault:
    privileged: true
    build: ./vault/
    restart: always
    env_file:
      - .env
    container_name: vault
    depends_on:
      cert-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      chat_db:
        condition: service_healthy
    ports:
      - "8201:8201"
      - "8200:8200"
    environment:
      VAULT_API_ADDR: "https://vault:8200"
      VAULT_ADDR: "https://127.0.0.1:8200"
      VAULT_CACERT: ./vault/userconfig/tls/ca.crt
    cap_add:
      - IPC_LOCK
    volumes:
      - ./vault/config:/vault/config
      - ./vault/userconfig:/vault/userconfig
      - ./vault/data:/vault/data
      - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=https://127.0.0.1:8200 -ca-cert=./vault/userconfig/tls/ca.crt 2>&1 | grep -q 'Sealed.*false' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  vault-agent:
    privileged: true
    build: ./agent/
    user: root
    cap_add:
      - IPC_LOCK
    container_name: vault-agent
    restart: always
    volumes:
      - ./agent/vault-agent-config.hcl:/vault/config/agent.hcl:ro
      - ./templates:/vault/templates
      - vault-secrets:/vault/secrets
      - vault-ai:/vault/aii
      - vault-chat:/vault/chat
      - ./vault/userconfig/tls/ca.crt:/vault/certs/ca.crt
      - ./vault/userconfig/:/vault/userconfig/
    networks:
      - app-network
    depends_on:
      vault:
        condition: service_healthy
     

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
  pp_data:
  vault-secrets:
  approle-creds:
  vault-ai:
  vault-chat: