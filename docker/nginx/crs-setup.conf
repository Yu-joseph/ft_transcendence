# -----------------------------------------------------------------------
# [1] DEFAULT ACTION — Anomaly Scoring Mode
# -----------------------------------------------------------------------

SecDefaultAction "phase:1,log,auditlog,pass"
SecDefaultAction "phase:2,log,auditlog,pass"

# -----------------------------------------------------------------------
# [2] PARANOIA LEVEL
# -----------------------------------------------------------------------

SecAction \
    "id:900000,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    tag:'OWASP_CRS',\
    ver:'OWASP_CRS/4.26.0-dev',\
    setvar:tx.blocking_paranoia_level=1"

SecAction \
    "id:900001,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    tag:'OWASP_CRS',\
    ver:'OWASP_CRS/4.26.0-dev',\
    setvar:tx.detection_paranoia_level=2"

# -----------------------------------------------------------------------
# [3] ANOMALY SCORING THRESHOLDS
# -----------------------------------------------------------------------

SecAction \
    "id:900110,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    tag:'OWASP_CRS',\
    ver:'OWASP_CRS/4.26.0-dev',\
    setvar:tx.inbound_anomaly_score_threshold=5,\
    setvar:tx.outbound_anomaly_score_threshold=4"

# -----------------------------------------------------------------------
# [4] ANOMALY SCORE REPORTING LEVEL
# -----------------------------------------------------------------------

SecAction \
    "id:900115,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    tag:'OWASP_CRS',\
    ver:'OWASP_CRS/4.26.0-dev',\
    setvar:tx.reporting_level=4"


# -----------------------------------------------------------------------
# [5] HTTP METHODS
# -----------------------------------------------------------------------

SecAction \
    "id:900200,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    tag:'OWASP_CRS',\
    ver:'OWASP_CRS/4.26.0-dev',\
    setvar:'tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE'"

# -----------------------------------------------------------------------
# [6] ALLOWED REQUEST CONTENT TYPES
# -----------------------------------------------------------------------

SecAction \
    "id:900220,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    tag:'OWASP_CRS',\
    ver:'OWASP_CRS/4.26.0-dev',\
    setvar:'tx.allowed_request_content_type=|application/x-www-form-urlencoded| |multipart/form-data| |application/json| |text/plain| |text/html| |application/xml|'"

# -----------------------------------------------------------------------
# [8] RESTRICTED FILE EXTENSIONS
# -----------------------------------------------------------------------

SecAction \
    "id:900240,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    tag:'OWASP_CRS',\
    ver:'OWASP_CRS/4.26.0-dev',\
    setvar:'tx.restricted_extensions=.bak/ .backup/ .bat/ .cfg/ .cmd/ .conf/ .config/ .db/ .dll/ .env/ .git/ .ini/ .key/ .log/ .old/ .pass/ .pdb/ .pem/ .py/ .pyc/ .rdb/ .sh/ .sql/ .sqlite/ .sqlite3/ .swp/ .tmp/'"


# -----------------------------------------------------------------------
# [9] RESTRICTED HEADERS — BASIC (always forbidden)
# -----------------------------------------------------------------------

SecAction \
    "id:900250,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    tag:'OWASP_CRS',\
    ver:'OWASP_CRS/4.26.0-dev',\
    setvar:'tx.restricted_headers_basic=/content-encoding/ /proxy/ /lock-token/ /content-range/ /if/ /x-http-method-override/ /x-http-method/ /x-method-override/ /x-middleware-subrequest/ /expect/'"

# EXTENDED headers (forbidden at higher PL — PL2 will catch these)
SecAction \
    "id:900255,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    tag:'OWASP_CRS',\
    ver:'OWASP_CRS/4.26.0-dev',\
    setvar:'tx.restricted_headers_extended=/accept-charset/'"


