
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q-Learning Tic-Tac-Toe</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <div class="game-card">
    <h1>Q-Learning Tic-Tac-Toe</h1>
    <p class="game-rule">3 pieces each — then move them!</p>

    <div class="badges">
      <span class="badge">Player: X</span>
      <span class="badge ai">AI: O</span>
    </div>

    <p id="trainingStatus" class="subtext">Loading AI model…</p>
    <p id="status" class="status">Please wait…</p>

    <div class="board-wrapper">
      <div class="board" id="board"></div>
    </div>

    <button class="reset-btn" onclick="resetGame()">New Game</button>

    <div style="margin-top: 20px; text-align: center;">
      <a href="/studio" class="studio-link">🤖 LLM Studio</a>
    </div>

    <p class="footer">
      Reinforcement Learning • Q-Learning • 3-Piece Rule
    </p>
  </div>

  <script src="{{ url_for('static', filename='game-script.js') }}"></script>
</body>
</html>
